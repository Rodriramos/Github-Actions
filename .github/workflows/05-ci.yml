name: 05 - CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  
jobs:
  frontend-lint:
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-ci-cd

      - name: Lint
        run: pnpm lint:frontend

  frontend-test:
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-ci-cd

      - name: Test
        run: pnpm test:frontend
  
  frontend-build:
    needs: [frontend-lint, frontend-test]
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-ci-cd

      - name: Build
        run: pnpm build:frontend

  backend-lint:
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-ci-cd

      - name: Lint
        run: pnpm lint:backend

  backend-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-ci-cd

      - name: Test
        run: pnpm test:backend

  backend-build:
    needs: [backend-lint, backend-test]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pnpm-ci-cd

      - name: Build
        run: |
          echo "Building backend and frontend..."
          pnpm build:backend
          pnpm start:backend
          curl - X GET http://localhost:3000/health